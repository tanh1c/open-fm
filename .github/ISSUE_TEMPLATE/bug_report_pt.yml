name: "🐛 Relatório de Bug (Português PT)"
description: "Reportar um bug ou crash em português europeu"
labels: ["bug", "alpha"]
body:
  - type: markdown
    attributes:
      value: |
        ## Relatório de Bug
        Obrigado por reportares um bug!
        Por favor preenche o máximo de detalhes possível.
        Podes escrever em português europeu neste template.

  - type: textarea
    id: what-happened
    attributes:
      label: "O que aconteceu?"
      description: "Descreve o bug de forma clara."
      placeholder: "O jogo crashou quando tentei..."
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "O que esperavas?"
      description: "O que deveria ter acontecido em vez disso?"
      placeholder: "Esperava que o jogo começasse normalmente..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: "Passos para reproduzir"
      description: "Como podemos reproduzir este bug?"
      placeholder: |
        1. Inicia um novo jogo
        2. Escolhe uma equipa
        3. Avança até ao dia de jogo
        4. Clica em "Vai para o Campo"
        5. O jogo crasha
    validations:
      required: false

  - type: dropdown
    id: frequency
    attributes:
      label: "Com que frequência acontece?"
      options:
        - Sempre
        - Às vezes
        - Só aconteceu uma vez
    validations:
      required: true

  - type: textarea
    id: game-context
    attributes:
      label: "Contexto do jogo"
      description: "Em que dia/jornada estavas? O que estavas a fazer? Tinhas acabado de carregar um save?"
      placeholder: "Estava na jornada 5, logo após um jogo..."
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: "Sistema operativo"
      description: "ex. Windows 11, macOS 15, Ubuntu 24.04"
      placeholder: "Windows 11"
    validations:
      required: true

  - type: input
    id: resolution
    attributes:
      label: "Resolução do ecrã"
      description: "ex. 1920x1080"
      placeholder: "1920x1080"
    validations:
      required: false

  - type: checkboxes
    id: logs
    attributes:
      label: "Ficheiros de log"
      description: |
        Por favor anexa os teus ficheiros de log! Ajudam-nos a corrigir bugs muito mais depressa.
        **Windows:** `C:\Users\<Tu>\AppData\Roaming\com.sturdyrobot.openfootmanager\logs\`
        **macOS:** `~/Library/Application Support/com.sturdyrobot.openfootmanager/logs/`
        **Linux:** `~/.local/share/com.sturdyrobot.openfootmanager/logs/`
      options:
        - label: "Anexei os meus ficheiros de log (arrasta abaixo a pasta logs comprimida em zip)"
          required: false

  - type: textarea
    id: logs-and-screenshots
    attributes:
      label: "Ficheiros de log e capturas"
      description: "Arrasta aqui a pasta logs comprimida e quaisquer capturas relevantes."
      placeholder: "Arrasta ficheiros aqui..."
    validations:
      required: false
